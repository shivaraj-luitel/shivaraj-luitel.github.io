<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add New Note</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="max-w-2xl mx-auto mt-10 bg-white rounded-3xl shadow-xl p-10">
    <h1 class="text-3xl font-bold mb-8 flex items-center gap-3">
      <i class="fas fa-upload text-blue-600"></i> Add New Note
    </h1>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Note Title</label>
        <input id="title" type="text" class="w-full border rounded-2xl px-4 py-3" placeholder="e.g. IoT Fundamentals">
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Description</label>
        <textarea id="description" rows="3" class="w-full border rounded-2xl px-4 py-3" placeholder="Short description..."></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">File Name (after uploading to notes/ folder)</label>
        <input id="filename" type="text" class="w-full border rounded-2xl px-4 py-3" placeholder="e.g. iot-fundamentals.pdf">
      </div>

      <button onclick="generateNoteCode()" 
              class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold hover:bg-blue-700">
        Generate Note Code
      </button>
    </div>

    <div id="output" class="hidden mt-8">
      <h3 class="font-semibold mb-3">Copy this code and paste in notes.html</h3>
      <textarea id="codeOutput" class="w-full h-48 border rounded-2xl p-4 font-mono text-sm"></textarea>
      <button onclick="copyCode()" 
              class="mt-4 bg-green-600 text-white px-6 py-3 rounded-2xl">
        Copy to Clipboard
      </button>
    </div>
  </div>

  <script>
    function generateNoteCode() {
      const title = document.getElementById('title').value || "Untitled Note";
      const desc = document.getElementById('description').value || "No description";
      const file = document.getElementById('filename').value || "file.pdf";

      const code = `      {
        title: "${title}",
        description: "${desc}",
        file: "notes/${file}"
      },`;

      document.getElementById('codeOutput').value = code;
      document.getElementById('output').classList.remove('hidden');
    }

    function copyCode() {
      const textarea = document.getElementById('codeOutput');
      textarea.select();
      document.execCommand('copy');
      alert("✅ Code copied! Now paste it inside the myNotes array in notes.html");
    }
  </script>
</body>
</html>
