<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes & Resources - Shiva Raj Luitel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

  <!-- Navbar -->
  <nav class="bg-white dark:bg-gray-900 border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">Shiva Raj Luitel</h1>
      <div class="flex gap-8 text-lg">
        <a href="index.html" class="hover:text-blue-600">Home</a>
        <a href="about.html" class="hover:text-blue-600">About</a>
        <a href="projects.html" class="hover:text-blue-600">Projects</a>
        <a href="experience.html" class="hover:text-blue-600">Experience</a>
        <a href="notes.html" class="hover:text-blue-600 font-medium">Notes</a>
        <a href="blog.html" class="hover:text-blue-600">Blog</a>
        <a href="contact.html" class="hover:text-blue-600">Contact</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-16">
    <h1 class="text-4xl font-bold mb-4">Notes & Resources</h1>
    <p class="text-xl text-gray-600 dark:text-gray-400 mb-12">Live notes uploaded from backend</p>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="notes-grid">
      <!-- Notes will load here automatically -->
    </div>
  </div>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyDBjDgURh-uEh5knW4IS2kfBXcNuo4jHsA",
  authDomain: "shivaraj-notes.firebaseapp.com",
  projectId: "shivaraj-notes",
  storageBucket: "shivaraj-notes.firebasestorage.app",
  messagingSenderId: "970146808139",
  appId: "1:970146808139:web:121fa2c1cbb71091d7e8ce",
  measurementId: "G-0QM5W476P9"
};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Load Notes
    async function loadNotes() {
      const grid = document.getElementById('notes-grid');
      grid.innerHTML = '<p class="col-span-3 text-center py-10">Loading notes...</p>';

      try {
        const snapshot = await db.collection('notes').orderBy('createdAt', 'desc').get();
        
        if (snapshot.empty) {
          grid.innerHTML = '<p class="col-span-3 text-center py-10 text-gray-500">No notes uploaded yet.</p>';
          return;
        }

        grid.innerHTML = '';
        snapshot.forEach(doc => {
          const note = doc.data();
          const card = `
            <div class="bg-white dark:bg-gray-900 rounded-3xl shadow hover:shadow-xl p-8 transition">
              <div class="flex items-center gap-4 mb-6">
                <i class="fas fa-file-pdf text-4xl text-red-500"></i>
                <div>
                  <h3 class="font-semibold text-xl">${note.title}</h3>
                  <p class="text-sm text-gray-500">${note.subject || 'Lecture Note'}</p>
                </div>
              </div>
              <p class="text-gray-600 dark:text-gray-400 mb-6 line-clamp-3">${note.description}</p>
              <a href="${note.fileUrl}" target="_blank" 
                 class="inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl hover:bg-blue-700">
                <i class="fas fa-download"></i> Download PDF
              </a>
            </div>
          `;
          grid.innerHTML += card;
        });
      } catch (error) {
        console.error(error);
        grid.innerHTML = '<p class="text-red-500">Error loading notes.</p>';
      }
    }

    // Load notes when page opens
    window.onload = loadNotes;
  </script>
</body>
</html>
