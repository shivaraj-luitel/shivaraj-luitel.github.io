<!-- FIREBASE + LOGIC -->
<script>
  // 🔥 STEP 1: Firebase Config (PASTE YOUR VALUES HERE)
 // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBfZ4eEoh0AhYYqvnd_p0c5KwhE4I7OsYs",
  authDomain: "notes-d0771.firebaseapp.com",
  projectId: "notes-d0771",
  storageBucket: "notes-d0771.firebasestorage.app",
  messagingSenderId: "927233194456",
  appId: "1:927233194456:web:8601505c3dfacf416fdaad"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

  // 🔥 STEP 2: Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const grid = document.getElementById("notes-grid");

  // 🔥 STEP 3: Load Notes
  function loadNotes() {

    grid.innerHTML = `<p class="text-center col-span-3 text-gray-500">Loading notes...</p>`;

    db.collection("notes").get().then(snapshot => {

      grid.innerHTML = "";

      if (snapshot.empty) {
        grid.innerHTML = `<p class="text-center col-span-3">No notes found</p>`;
        return;
      }

      snapshot.forEach(doc => {
        const note = doc.data();

        grid.innerHTML += `
          <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow hover:shadow-xl transition">

            <h3 class="text-xl font-bold mb-2">${note.title}</h3>

            <p class="text-sm text-gray-500 mb-4">
              ${note.category || ''}
            </p>

            <a href="${note.file}" target="_blank"
               class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
              Download PDF
            </a>

          </div>
        `;
      });

    }).catch(error => {
      console.error(error);
      grid.innerHTML = `<p class="text-red-500">Error loading notes</p>`;
    });
  }

  loadNotes();
</script>
